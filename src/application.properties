spring.mail.host=${PLAYTRACK_SMTP_HOST:smtp.gmail.com}
spring.mail.port=${PLAYTRACK_SMTP_PORT:587}
spring.mail.username=${PLAYTRACK_SMTP_USERNAME:}
spring.mail.password=${PLAYTRACK_SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# OTP behavior:
# - debug logging stays disabled by default
# - simulated fallback is disabled by default to enforce real email delivery
playtrack.otp.debug-log-enabled=${PLAYTRACK_OTP_DEBUG_LOG:false}
playtrack.otp.allow-simulated-fallback=${PLAYTRACK_OTP_SIMULATED_FALLBACK:false}

logging.level.org.springframework=INFO
