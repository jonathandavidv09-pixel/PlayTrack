spring.mail.host=${PLAYTRACK_SMTP_HOST:}
spring.mail.port=${PLAYTRACK_SMTP_PORT:587}
spring.mail.username=${PLAYTRACK_SMTP_USERNAME:}
spring.mail.password=${PLAYTRACK_SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# OTP behavior:
# - default is production-safe (no OTP leakage to logs/db)
# - set to true only for local development/testing
playtrack.otp.debug-log-enabled=${PLAYTRACK_OTP_DEBUG_LOG:false}
playtrack.otp.allow-simulated-fallback=${PLAYTRACK_OTP_SIMULATED_FALLBACK:false}

logging.level.org.springframework=INFO
